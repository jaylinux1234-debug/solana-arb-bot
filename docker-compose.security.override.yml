# Compatibility overlay at repo root.
# Canonical file: infra/compose/docker-compose.security.override.yml

services:
  monitor:
    user: "0:0"
    security_opt:
      - no-new-privileges:true
    ports: !override
      - "127.0.0.1:${BOT_HEALTH_PORT:-8000}:8000"
      - "${WEBHOOK_BIND_IP:-127.0.0.1}:${HELIUS_WEBHOOK_PORT:-8799}:8799"
      - "127.0.0.1:${METRICS_PROMETHEUS_PORT:-9091}:9091"

  prometheus:
    security_opt:
      - no-new-privileges:true
    ports: !override
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    security_opt:
      - no-new-privileges:true
    ports: !override
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"

  redis:
    security_opt:
      - no-new-privileges:true
