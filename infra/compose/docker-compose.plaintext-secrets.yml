# Dev/local overlay when secrets/encrypted/*.enc.yaml are not created yet.
# Mounts secrets/.local/* (gitignored). Do not use on shared/production hosts.
# Auto-applied by compose-prod-restart / compose-prod-up when encrypted files are missing.

secrets:
  sops_age_key:
    file: ./secrets/.local/sops_age_key
  private_key:
    file: ./secrets/.local/private_key.txt
  private_key_cex_dex:
    file: ./secrets/.local/private_key.txt
  jupiter_api_key:
    file: ./secrets/.local/jupiter_api_key
  openai_api_key:
    file: ./secrets/.local/openai_api_key
  backpack_secret:
    file: ./secrets/.local/backpack_secret
  backpack_api_key:
    file: ./secrets/.local/backpack_api_key
  helius_api_key:
    file: ./secrets/.local/helius_api_key
  alchemy_api_key:
    file: ./secrets/.local/alchemy_api_key
  oneinch_api_key:
    file: ./secrets/.local/oneinch_api_key.txt
  cow_api_key:
    file: ./secrets/.local/cow_api_key.txt
  pagerduty_routing_key:
    file: ./secrets/.local/pagerduty_routing_key.txt
