# Scrapes bot /metrics from monitor (alias solana-bot on botnet).
# Redis:6379 is the Redis protocol port — add redis_exporter:9121 for Redis Prometheus metrics.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: solana-bot
    metrics_path: /metrics
    static_configs:
      - targets: ["monitor:8000"]
        labels:
          service: monitor

  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]
        labels:
          service: redis
